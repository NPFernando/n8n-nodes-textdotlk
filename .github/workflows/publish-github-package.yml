name: Publish GitHub Package

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-github-package:
    name: publish @npfernando package to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: '@npfernando'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate package
        run: npm run validate:package

      - name: Prepare scoped GitHub Packages manifest
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = '@npfernando/n8n-nodes-textdotlk';
          pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
