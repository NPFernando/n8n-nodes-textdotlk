version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
    groups:
      n8n-tooling:
        patterns:
          - "@n8n/*"
          - "n8n-workflow"
      dev-tooling:
        dependency-type: development
